<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Solutions | White Label</title>
    <meta
      name="description"
      content="Professional business solutions customized for your company needs."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Essential initial styles */
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      html {
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      html.ready {
        visibility: visible;
        opacity: 1;
      }

      #app {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
      }
    </style>
    <script>
      // Apply theme before render to prevent flash
      (function () {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);

        // Add ready class to make the page visible once styles are applied
        window.addEventListener('DOMContentLoaded', () => {
          document.documentElement.classList.add('ready');
        });
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
